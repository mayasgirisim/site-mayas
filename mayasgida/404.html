<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayfa bulunamadı · MAYAS</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Baloo+2:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F7EEE3;--ink:#1B1A19;--ink-soft:#56524B;--magenta:#D81E6A;--purple:#6A3C9C}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;text-align:center;
    background:radial-gradient(900px 460px at 80% -10%,rgba(232,136,30,.12),transparent 60%),var(--paper);
    color:var(--ink);font-family:"Manrope",system-ui,sans-serif;padding:24px}
  .logo{height:30px;margin-bottom:30px}
  .code{font-family:"Baloo 2",cursive;font-weight:800;font-size:clamp(4rem,18vw,9rem);line-height:.9;
    background:linear-gradient(96deg,var(--magenta),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent}
  .eye{font-family:"Space Mono",monospace;font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;color:var(--magenta);margin-bottom:14px}
  h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;margin:6px 0 10px}
  p{color:var(--ink-soft);max-width:42ch;margin:0 auto 26px}
  a.btn{display:inline-flex;align-items:center;gap:.5em;font-weight:700;padding:13px 24px;border-radius:100px;
    background:var(--ink);color:var(--paper);text-decoration:none;transition:transform .18s}
  a.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div>
    <img class="logo" src="/images/mayas-logo.png" alt="MAYAS">
    <div class="eye">Tek hat · İki ürün · Sıfır atık</div>
    <div class="code">404</div>
    <h1>Bu sayfayı bulamadık.</h1>
    <p>Aradığın içerik taşınmış ya da hiç var olmamış olabilir. Seni ana sayfaya geri götürelim.</p>
    <a class="btn" href="/">← Ana sayfaya dön</a>
  </div>
</body>
</html>
